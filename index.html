<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Preserved Remains of Imagination</title>
    <!-- Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700&family=Manrope:wght@200;400;600&family=La+Belle+Aurore&display=swap" rel="stylesheet">
    <!-- Libraries -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
    <script src="https://cdn.jsdelivr.net/gh/studio-freight/lenis@1.0.19/bundled/lenis.min.js"></script>
    
    <style>
        :root {
            /* Eye-comfort Light Palette */
            --paper: #F9F7F2;      /* Soft Cream */
            --linen: #F1EFE7;      /* Beige Base */
            --sand: #E5E1D5;       /* Muted Tan */
            --ink: #2C2C2C;        /* Soft Charcoal for Text */
            --accent: #A69177;     /* Muted Earth Tone */
            --ethereal-blue: #C5D5E4;
            --glass: rgba(255, 255, 255, 0.4);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            cursor: none;
        }

        body {
            background-color: var(--paper);
            color: var(--ink);
            font-family: 'Manrope', sans-serif;
            overflow: hidden;
            line-height: 1.6;
            height: 100vh;
        }

        /* --- Global Assets --- */
        #canvas-container {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100vh;
            z-index: -1;
            opacity: 0.6;
        }

        .film-grain {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: url('https://grainy-gradients.vercel.app/noise.svg');
            opacity: 0.04;
            pointer-events: none;
            z-index: 999;
            filter: contrast(150%) brightness(100%);
        }

        .vignette {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: radial-gradient(circle, transparent 50%, rgba(241, 239, 231, 0.5) 100%);
            pointer-events: none;
            z-index: 998;
        }

        /* --- Custom Cursor --- */
        #cursor {
            position: fixed;
            width: 8px; height: 8px;
            background: var(--accent);
            border-radius: 50%;
            pointer-events: none;
            z-index: 10000;
        }

        #cursor-follower {
            position: fixed;
            width: 40px; height: 40px;
            border: 1px solid var(--accent);
            border-radius: 50%;
            pointer-events: none;
            z-index: 9999;
            opacity: 0.3;
        }

        /* --- Common UI --- */
        .glass-panel {
            background: var(--glass);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.5);
            box-shadow: 0 15px 45px rgba(166, 145, 119, 0.1);
            border-radius: 2px; /* Sharper, more gallery-like edges */
        }

        .premium-button {
            padding: 1.2rem 3.5rem;
            background: var(--ink);
            border: 1px solid var(--ink);
            color: var(--paper);
            font-family: 'Cinzel', serif;
            letter-spacing: 4px;
            cursor: pointer;
            transition: all 0.5s cubic-bezier(0.23, 1, 0.32, 1);
            text-transform: uppercase;
            font-size: 0.8rem;
        }

        .premium-button:hover {
            background: transparent;
            color: var(--ink);
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(0, 0, 0, 0.05);
        }

        /* --- App Architecture --- */
        .app-view {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 5vw;
            opacity: 0;
            visibility: hidden;
            transition: opacity 1s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .app-view.active {
            opacity: 1;
            visibility: visible;
        }

        /* --- Hero View --- */
        .hero-panel { padding: 6rem; max-width: 900px; text-align: center; }
        h1 { font-family: 'Cinzel', serif; font-size: clamp(2.5rem, 6vw, 4.2rem); margin-bottom: 1.5rem; color: var(--ink); font-weight: 400; letter-spacing: -1px; }

        .handwritten {
            font-family: 'La Belle Aurore', cursive;
            color: var(--accent);
        }

        /* --- Category View --- */
        .grid-layout {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 2rem;
            width: 100%;
            max-width: 1200px;
        }

        .category-card {
            height: 500px;
            position: relative;
            cursor: pointer;
            display: flex;
            flex-direction: column;
            justify-content: flex-end;
            align-items: flex-start;
            padding: 3rem;
            overflow: hidden;
            transition: all 0.7s cubic-bezier(0.19, 1, 0.22, 1);
            border: 1px solid rgba(0,0,0,0.03);
        }

        .category-card img {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            object-fit: cover;
            z-index: 0;
            filter: sepia(30%) brightness(1.1) saturate(0.8);
            transition: 1.2s cubic-bezier(0.19, 1, 0.22, 1);
        }

        .category-card:hover { transform: translateY(-10px); background: white; }
        .category-card:hover img { transform: scale(1.08); filter: sepia(0%) brightness(1) saturate(1); }

        .category-card h2 { font-size: 2rem; z-index: 2; position: relative; color: var(--ink); letter-spacing: 2px; font-weight: 400; }
        .category-card span { font-size: 0.7rem; letter-spacing: 5px; color: var(--accent); margin-bottom: 0.5rem; z-index: 2; position: relative; font-weight: 600; }

        /* --- List View --- */
        .archive-list {
            display: flex;
            flex-direction: column;
            gap: 1rem;
            width: 100%;
            max-width: 800px;
            max-height: 70vh;
            overflow-y: auto;
        }

        .archive-item {
            padding: 2rem 3rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            cursor: pointer;
            transition: 0.4s;
            border: 1px solid rgba(0,0,0,0.05);
            background: white;
        }

        .archive-item:hover { 
            background: var(--linen);
            transform: translateX(10px); 
            border-color: var(--accent);
        }

        /* --- Reader View --- */
        .reader-panel {
            width: 100%;
            max-width: 900px;
            max-height: 85vh;
            overflow-y: auto;
            padding: 5rem;
            text-align: left;
            position: relative;
            background: white;
        }

        .reader-image {
            width: 100%;
            height: 350px;
            object-fit: cover;
            margin-bottom: 4rem;
            filter: sepia(20%);
        }

        .back-btn {
            position: fixed;
            top: 40px; left: 40px;
            font-family: 'Cinzel', serif;
            color: var(--ink);
            text-decoration: none;
            font-size: 0.7rem;
            letter-spacing: 3px;
            padding: 10px 20px;
            border: 1px solid var(--sand);
            z-index: 3000;
            background: var(--paper);
            transition: 0.3s;
        }

        .back-btn:hover { background: var(--ink); color: var(--paper); }

        /* --- Loader --- */
        .loader {
            position: fixed; top:0; left:0; width:100%; height:100%;
            background: var(--paper); z-index: 10001;
            display: flex; justify-content: center; align-items: center;
        }

        .progress-beam {
            position: fixed; top: 0; left: 0; height: 2px;
            background: var(--accent);
            width: 0%; z-index: 2001;
        }

        ::-webkit-scrollbar { width: 4px; }
        ::-webkit-scrollbar-thumb { background: var(--sand); }

    </style>
</head>
<body>

    <div class="loader" id="loader">
        <span style="font-family: 'Cinzel'; letter-spacing: 10px; color: var(--accent); font-size: 0.8rem;">CURATING EXHIBITION</span>
    </div>

    <div id="cursor"></div>
    <div id="cursor-follower"></div>
    <div class="film-grain"></div>
    <div class="vignette"></div>
    <div class="progress-beam" id="progress-beam"></div>

    <div id="canvas-container"></div>

    <a href="#" class="back-btn" id="back-nav" style="display:none;">← GALLERY EXIT</a>

    <!-- VIEW 1: HERO -->
    <div class="app-view active" id="view-hero">
        <div class="hero-panel">
            <span style="letter-spacing: 8px; color: var(--accent); font-size: 0.7rem; font-weight: 600; text-transform: uppercase;">A Collection of Preserved Remains</span>
            <h1>The Preserved Imagination</h1>
            <p class="handwritten" style="font-size: 2rem; margin-bottom: 4rem; opacity: 0.9;">Soft whispers from a world that once dreamt in color.</p>
            <button class="premium-button" onclick="navigateTo('view-vault')">Open Archive</button>
        </div>
    </div>

    <!-- VIEW 2: VAULT (CATEGORIES) -->
    <div class="app-view" id="view-vault">
        <div class="grid-layout">
            <div class="glass-panel category-card" onclick="openCategory('stories')">
                <img src="https://images.unsplash.com/photo-1494438639946-1ebd1d20bf85?q=80&w=1000&auto=format&fit=crop" alt="Stories">
                <span>FOLDER I</span>
                <h2>Stories</h2>
            </div>
            <div class="glass-panel category-card" onclick="openCategory('poems')">
                <img src="https://images.unsplash.com/photo-1455849318743-b2233052fcff?q=80&w=1000&auto=format&fit=crop" alt="Poems">
                <span>FOLDER II</span>
                <h2>Poems</h2>
            </div>
            <div class="glass-panel category-card" onclick="openCategory('fragments')">
                <img src="https://images.unsplash.com/photo-1516410529446-2c777cb7366d?q=80&w=1000&auto=format&fit=crop" alt="Fragments">
                <span>FOLDER III</span>
                <h2>Fragments</h2>
            </div>
        </div>
    </div>

    <!-- VIEW 3: ARCHIVE LIST -->
    <div class="app-view" id="view-list">
        <div style="width: 100%; max-width: 800px;">
            <h1 id="list-title" style="margin-bottom: 3rem; border-bottom: 1px solid var(--sand); padding-bottom: 1rem; letter-spacing: 8px; font-weight: 400; font-size: 1.5rem;">INDEX</h1>
            <div class="archive-list" id="archive-list-container">
                <!-- Items injected here -->
            </div>
        </div>
    </div>

    <!-- VIEW 4: READER -->
    <div class="app-view" id="view-reader">
        <div class="glass-panel reader-panel">
            <img id="reader-image" class="reader-image" src="" alt="Atmosphere">
            <span id="reader-tag" style="color: var(--accent); letter-spacing: 6px; font-size: 0.7rem; font-weight: 600; display: block; margin-bottom: 1rem; text-transform: uppercase;"></span>
            <h1 id="reader-title" style="margin-bottom: 2.5rem; font-size: 3rem;"></h1>
            <div id="reader-content" style="font-size: 1.4rem; line-height: 1.8; color: var(--ink); font-weight: 300;">
            </div>
            <div style="margin-top: 5rem; border-top: 1px solid var(--sand); padding-top: 2rem; opacity: 0.4; font-size: 0.6rem; letter-spacing: 3px;">END OF PRESERVATION UNIT</div>
        </div>
    </div>

    <script>
        // --- Data Structure with Soft Imagery ---
        const ARCHIVE_DATA = {
            stories: [
                { 
                    id: 1, 
                    title: "The Ivory Clock", 
                    tag: "STORY // 01", 
                    img: "https://images.unsplash.com/photo-1508913922824-47cabbaf5241?q=80&w=1000&auto=format&fit=crop",
                    content: "The clock didn't tick; it breathed. Every second was a soft expansion of mahogany and brass. In the quiet morning of the old library, the dust motes danced like tiny, silent civilizations. 'Time,' the keeper said, 'is only a suggestion made by the sun.'" 
                },
                { 
                    id: 2, 
                    title: "Silk & Stone", 
                    tag: "STORY // 02", 
                    img: "https://images.unsplash.com/photo-1519750783826-e2420f4d687f?q=80&w=1000&auto=format&fit=crop",
                    content: "She wore a dress made of morning mist. It was fragile, tethered to the world only by the weight of her thoughts. As she walked across the marble gallery, her footsteps left no sound, only the faint scent of dried lavender and old paper." 
                }
            ],
            poems: [
                { 
                    id: 3, 
                    title: "Linen Skies", 
                    tag: "POEM // 01", 
                    img: "https://images.unsplash.com/photo-1495195129352-aed325a55b65?q=80&w=1000&auto=format&fit=crop",
                    content: "The sky is a folded sheet,<br>Unwashed and warm from the sun.<br>Clouds are the wrinkles<br>Where the day has begun.<br>Sleep now, in the cream of the light." 
                },
                { 
                    id: 4, 
                    title: "Feather & Ink", 
                    tag: "POEM // 02", 
                    img: "https://images.unsplash.com/photo-1455390582262-044cdead277a?q=80&w=1000&auto=format&fit=crop",
                    content: "To write is to bleed<br>In the softest of ways.<br>Turning the nights<br>Into beautiful days." 
                }
            ],
            fragments: [
                { 
                    id: 5, 
                    title: "Echoes of Sand", 
                    tag: "FRAGMENT // 01", 
                    img: "https://images.unsplash.com/photo-1509316975850-ff9c5deb0cd9?q=80&w=1000&auto=format&fit=crop",
                    content: "We are all just fragments of a larger mirror, trying to reflect the same light in different directions." 
                }
            ]
        };

        let currentView = 'view-hero';
        let viewHistory = ['view-hero'];

        function navigateTo(viewId) {
            const currentEl = document.getElementById(currentView);
            const nextEl = document.getElementById(viewId);
            const backBtn = document.getElementById('back-nav');

            gsap.to(currentEl, { opacity: 0, y: 20, duration: 0.6, onComplete: () => {
                currentEl.classList.remove('active');
                nextEl.classList.add('active');
                gsap.fromTo(nextEl, { opacity: 0, y: -20 }, { opacity: 1, y: 0, duration: 1, ease: "power2.out" });
                currentView = viewId;
                backBtn.style.display = viewId === 'view-hero' ? 'none' : 'block';
            }});

            if(viewId !== currentView) viewHistory.push(viewId);
        }

        document.getElementById('back-nav').addEventListener('click', (e) => {
            e.preventDefault();
            if(viewHistory.length > 1) {
                viewHistory.pop();
                navigateTo(viewHistory.pop());
                if(currentView === 'view-vault') gsap.to("#progress-beam", { width: "0%", duration: 0.5 });
            }
        });

        function openCategory(type) {
            const listContainer = document.getElementById('archive-list-container');
            const listTitle = document.getElementById('list-title');
            listContainer.innerHTML = '';
            listTitle.innerText = type.toUpperCase();

            ARCHIVE_DATA[type].forEach(item => {
                const div = document.createElement('div');
                div.className = 'archive-item';
                div.innerHTML = `
                    <div>
                        <span style="font-size: 0.6rem; color: var(--accent); letter-spacing: 2px; font-weight: 600;">${item.tag}</span>
                        <h3 style="margin-top: 5px; font-family: 'Cinzel'; font-weight: 400; color: var(--ink);">${item.title}</h3>
                    </div>
                    <span style="font-size: 0.6rem; opacity: 0.5; letter-spacing: 2px;">VIEW ENTRY</span>
                `;
                div.onclick = () => openReader(item);
                listContainer.appendChild(div);
            });

            navigateTo('view-list');
        }

        function openReader(item) {
            document.getElementById('reader-title').innerText = item.title;
            document.getElementById('reader-tag').innerText = item.tag;
            document.getElementById('reader-content').innerHTML = item.content;
            document.getElementById('reader-image').src = item.img;
            
            gsap.to("#progress-beam", { width: "100%", duration: 0.8 });
            navigateTo('view-reader');
        }

        window.onload = () => {
            initThree();
            initCursor();
            setTimeout(() => {
                gsap.to('#loader', { opacity: 0, duration: 1.5, onComplete: () => {
                    document.getElementById('loader').style.display = 'none';
                }});
            }, 1000);
        };

        function initCursor() {
            const cursor = document.getElementById('cursor');
            const follower = document.getElementById('cursor-follower');
            window.addEventListener('mousemove', (e) => {
                gsap.to(cursor, { x: e.clientX, y: e.clientY, duration: 0.1 });
                gsap.to(follower, { x: e.clientX - 20, y: e.clientY - 20, duration: 0.4 });
            });
        }

        let scene, camera, renderer, particles;
        function initThree() {
            scene = new THREE.Scene();
            camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
            renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            document.getElementById('canvas-container').appendChild(renderer.domElement);

            const geometry = new THREE.BufferGeometry();
            const vertices = [];
            for (let i = 0; i < 2000; i++) {
                vertices.push(THREE.MathUtils.randFloatSpread(2000), THREE.MathUtils.randFloatSpread(2000), THREE.MathUtils.randFloatSpread(2000));
            }
            geometry.setAttribute('position', new THREE.Float32BufferAttribute(vertices, 3));
            particles = new THREE.Points(geometry, new THREE.PointsMaterial({ 
                color: 0xA69177, 
                size: 2, 
                transparent: true, 
                opacity: 0.15 
            }));
            scene.add(particles);

            camera.position.z = 800;

            function animate() {
                requestAnimationFrame(animate);
                particles.rotation.y += 0.0001;
                renderer.render(scene, camera);
            }
            animate();
            
            window.addEventListener('resize', () => {
                camera.aspect = window.innerWidth / window.innerHeight;
                camera.updateProjectionMatrix();
                renderer.setSize(window.innerWidth, window.innerHeight);
            });
        }
    </script>
</body>
</html>
